modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Team Concord"
credits="vveniamin, jackulee"
description="This mod changes the enchanting process for items to use the Smithing Template system added in 1.20"

[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="[${neoforge},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="blueprint"
mandatory=true
versionRange="[${blueprint_version},)"
ordering="AFTER"
side="BOTH"

[[mixins]]
config="mixins.${mod_id}.json"